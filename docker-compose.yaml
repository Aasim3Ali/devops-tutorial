services
  backend:
    build: ./server
    container_name: backend
    env_file: 
      - ./server/.env
    restart: always
    ports: 
      - "5000:5000"
  frontend:
    build: ./client
    container_name: frontend
    env_file:
      - ./client/.env
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      -backend
    